failure_record:
  schema_version: 0.1.0
  id: HP-FAIL-002
  date: 2026-07-14
  recorded_on: 2026-07-14
  title: Formal package and execution identity semantics were initially incomplete
  context:
    phase: GOV-4
    run: KGR-005
    component: Formal Run Package Identity
    branch: governance/kernel-designer-revision-v0.1
    commit: null
    environment: KGR-005 preparation design
  primary_classification: PROCESS_DEFECT
  classification:
    - NEAR_MISS
    - PROCESS_DEFECT
    - TOOLING_GAP
  severity: HIGH
  status: CORRECTED
  expected_behavior: Formal package contracts should distinguish repository custody, transport identity, isolated execution, and repository import while binding prompt, envelope, control, and members exactly.
  observed_behavior: Earlier semantics confused repository paths with transport members, did not separate three validation contexts, conflated package conflict with completed execution, and incompletely bound prompt and envelope identity.
  impact: A validator or operator could have rejected valid isolated inputs, accepted mismatched identity, or incorrectly consumed a run after a pre-substantive package conflict.
  detection_method: Cross-contract review of the KGR-005 envelope, prompt snapshot, transport package, and loop non-completion rules.
  root_cause:
    immediate: One path field and one validation concept were used for materially different custody and transport responsibilities.
    systemic: Preparation, isolated execution, and repository import were not originally modeled as distinct validation contexts.
    contributing_factors:
      - Output schemas remained embedded in prose.
      - No stage-aware deterministic package validator existed.
  response:
    containment: KGR-005 remained NOT_STARTED while the prompt, envelope, and loop semantics were corrected and hash-bound.
    correction: The prepared KGR-005 contracts now separate repository path, package member, pre-substantive conflict, execution, and import responsibilities and bind prompt/envelope identities.
    prevention:
      - Require typed custody, source, and transport-member identities.
      - Build a stage-aware package validator in a later authorized phase.
      - Treat package conflict as non-completion unless valid execution evidence exists.
    accountable_owner: Project Owner
    validation_required:
      - Test preparation, isolated-input, output, and import validation contexts independently.
      - Test prompt/envelope mismatch and non-consuming package-conflict cases.
  learning:
    reusable_lesson: Formal packages require separate custody, transport, execution, and import identities with exact stage-specific validation.
    candidate_system_changes:
      - SCRIPT
      - VALIDATION
      - SCHEMA
      - TEST
      - PROTOCOL
    applicable_future_phases:
      - GOV-4
      - Controller implementation
      - Future formal governance runs
