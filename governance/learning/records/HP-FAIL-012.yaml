  expected_behavior: The Phase 2.3 test verifies the structured skill identity, status, non-execution purpose, and explicit execution-authorization boundary expressed by HP-MPROP-002.
  observed_behavior: The test required the literal substring not formal execution, although the committed backlog used semantically equivalent structured statements and never contained that phrase.
  impact: The full governance suite failed one assertion on the clean baseline, blocking unrelated KGR-006 validation and publication despite no semantic contract violation.
  detection_method: The complete governance pytest suite was run during KGR-006 contract preparation and the failing assertion was compared with both committed files at HEAD.
  root_cause:
    immediate: A regression assertion searched incidental prose rather than parsing and checking the YAML proposal fields.
    systemic: Contract semantics and test representation were coupled through a literal phrase that was never part of the committed contract.
    contributing_factors:
      - Targeted Phase 2.3 tests were not rerun after the backlog wording evolved.
      - The test mixed structured identity/status checks with an unstructured substring assertion.
  response:
    containment: Stop KGR-006 publication and confirm the mismatch existed at the preparation baseline.
    correction: Parse the HP-MPROP-002 YAML block and assert the formal preparer name, status, non-execution purpose, and explicit authorization boundary semantically.
    prevention:
      - Prefer structured contract fields over incidental Markdown phrases.
      - Run the full governance suite before publication of later phases.
    accountable_owner: Project Owner
    validation_required:
      - Run the targeted Phase 2.3 test module.
      - Run the complete governance pytest suite.
      - Validate learning records, prompt custody, and git whitespace.
  learning:
    reusable_lesson: Tests for mixed Markdown/YAML governance contracts should parse structured fields and assert meaning-bearing invariants instead of requiring accidental prose.
    candidate_system_changes: [TEST, VALIDATION]
    applicable_future_phases: [All governance methodology validation]
