failure_record:
  schema_version: 0.1.0
  id: HP-FAIL-026
  date: '2026-07-17'
  recorded_on: '2026-07-17'
  title: Audit scaffold rejected the canonical PASS-03 review output path
  context:
    phase: GOV-AUD-001 PASS-03 adversarial review
    run: GOV-AUD-001-P03-AR-001
    component: Audit scaffold formal review-output lifecycle validation
    branch: governance/kernel-designer-revision-v0.1
    commit: 93c0333a2a60ac45c4444defd3f7447502b7e8b6
    environment: Codex deterministic governance-suite lifecycle correction
  primary_classification: TOOLING_GAP
  classification:
  - TOOLING_GAP
  - PROCESS_DEFECT
  severity: HIGH
  status: CORRECTED
  expected_behavior: The scaffold rejects empty or unauthorized placeholder output
    directories while permitting exact registered and hash-bound formal review results
    and invalid review diagnostics that do not advance PASS-03.
  observed_behavior: The planning-state placeholder scan rejected every directory
    named output, including the contract-declared PASS-03 review result path containing
    the preserved PASS_03_REVIEW_INVALID_OR_INCOMPLETE diagnostic.
  impact: The complete governance suite produced a false failure after honest materialization
    of the required review diagnostic, while the review contract simultaneously required
    that exact path.
  detection_method: The failed review attempt recorded governance/tests/test_gov_7_audit_scaffold.py::test_coherent_planning_only_state_is_valid
    rejecting review-executions/GOV-AUD-001-P03-AR-001/output.
  root_cause:
    immediate: Placeholder detection classified directories only by the terminal name
      output and did not examine contents, artifact registration or exact hashes.
    systemic: Audit lifecycle validation lacked a generic distinction between placeholder
      output, registered formal review evidence and invalid review diagnostics with
      no state advancement.
    contributing_factors:
    - The planning-only replay helper retained later review-execution custody, so
      materializing the contract-declared output exposed the name-only rule.
    - Earlier formal review-result precedents were registered by path and hash but
      the placeholder scan did not consult that registry evidence.
  response:
    containment: Preserve the existing invalid review diagnostic byte-for-byte, keep
      PASS-03 pending review and disposition, and keep PASS-04 unauthorized and unexecuted.
    correction: Classify review output directories using exact registered files and
      hashes; separately validate the invalid PASS-03 diagnostic identity and no-advancement
      semantics.
    prevention:
    - Test empty and unregistered review outputs as forbidden placeholders.
    - Test registered valid formal results and registered invalid diagnostics as distinct
      lifecycle classes.
    - Retain negative tests for premature PASS-03 acceptance, PASS-04 authority and
      invalid-review state advancement.
    accountable_owner: Project Owner
    validation_required:
    - Run focused audit-scaffold and PASS-03 adversarial-review preparation tests.
    - Run the complete governance suite and git diff --check.
  learning:
    reusable_lesson: Output-directory names cannot establish execution or invalidity;
      exact registration, hashes, result semantics and authority state must be evaluated
      separately.
    candidate_system_changes:
    - VALIDATION
    - TEST
    - DOCUMENTATION
    applicable_future_phases:
    - All formal review and evaluation lifecycles
