  expected_behavior: Historical Phase 2.4 tests preserve GOV-4 completion and require
    the standing Enforcement Engineering gate to remain closed without freezing an
    obsolete pre-execution status phrase.
  observed_behavior: The test required the exact string Enforcement Engineering gate
    CLOSED and failed when reconciliation truthfully changed it to CLOSED_TO_FURTHER_EXECUTION_PENDING_VERSIONED_CORRECTION.
  impact: The full governance suite failed and blocked the provenance reconciliation
    commit despite no opening of Enforcement Engineering or later phase.
  detection_method: Full governance pytest execution after KGR-006 state reconciliation.
  root_cause:
    immediate: A historical-phase test asserted one exact current-state presentation
      string.
    systemic: The regression mixed a durable Phase 2.4 invariant with mutable later-phase
      state vocabulary.
    contributing_factors:
    - The original assertion predated any GOV-5 execution evidence.
    - No later KGR-006 test owned the refined closed-pending-correction state.
  response:
    containment: Stop the first commit and preserve the failing full-suite diagnostic.
    correction: Require the exact reconciled closed-to-further-execution state while
      retaining separate tests that GOV-6 through GOV-9 are inactive.
    prevention:
    - Keep historical-phase invariants separate from later-phase state wording.
    - Update current-state assertions only with the same commit that changes durable
      state.
    - Run the full suite before every provenance or phase-state commit.
    accountable_owner: Project Owner
    validation_required:
    - Run the targeted Phase 2.4 and KGR-006 provenance tests.
    - Run the full governance suite.
  learning:
    reusable_lesson: Historical-phase tests should preserve enduring gate invariants
      without freezing mutable later-phase status wording.
    candidate_system_changes:
    - TEST
    - VALIDATION
    applicable_future_phases:
