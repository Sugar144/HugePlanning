  schema_version: 0.1.0
  id: HP-FAIL-004
  date: 2026-07-14
  recorded_on: 2026-07-14
  title: Formal learning and analysis artifacts were dispersed across non-canonical surfaces
  context:
    phase: GOV-4
    run: null
    component: Durable Learning and Formal Analysis Output
    branch: governance/kernel-designer-revision-v0.1
    commit: null
    environment: Governance architecture analysis and prior sessions
  primary_classification: PROCESS_DEFECT
  classification:
    - NEAR_MISS
    - PROCESS_DEFECT
    - TOOLING_GAP
  severity: MEDIUM
  status: CORRECTED
  expected_behavior: Material lessons and formal reusable analyses should be written to declared durable artifacts with canonical paths, formats, status, required sections, and validation contracts.
  observed_behavior: Reusable learning remained in temporary logs and parking-lot material, no canonical indexed records existed, and the architecture analysis was initially emitted only in the Codex session because its prompt omitted an output-artifact contract.
  impact: Reusable evidence could be lost, overlooked, duplicated, or unavailable for review, implementation, comparison, and versioning.
  detection_method: The Project Owner required the architecture analysis to be materialized in a corrective second step and then authorized this canonical Phase 1 learning system.
  root_cause:
    immediate: The formal analysis prompt did not require a filename, path, format, status, required sections, or validation requirements.
    systemic: No canonical record system connected material learning, deterministic indexing, and formal artifact output contracts.
    contributing_factors:
      - Operational chronology was used as the only durable learning surface.
      - Parking-lot files mixed prospective ideas with observed lessons.
  response:
    containment: The architecture report was materialized as a named local artifact and hash-verified before Phase 1 implementation.
    correction: Phase 1 adds structured base records, append-only events, deterministic indexing, and a mandatory formal-analysis output-artifact rule in the canonical operating contract.
    prevention:
      - Require an exact output artifact contract before every reusable formal analysis.
      - Triage material observations into canonical learning records rather than session-only logs.
      - Validate generated indexes against record and event source truth.
    accountable_owner: Project Owner
    validation_required:
      - Verify all four base records and generated index with manage_learning.py.
      - Test generated-view drift and byte-identical regeneration.
      - Review future formal prompts for complete output-artifact declarations before execution.
  learning:
    reusable_lesson: Declare and validate a durable output artifact before formal analysis, and store material learning in canonical indexed records.
    candidate_system_changes:
      - SCRIPT
      - VALIDATION
      - SCHEMA
      - TEST
      - AGENTS_INSTRUCTION
      - WORKFLOW_PATTERN
      - DOCUMENTATION
    applicable_future_phases:
      - GOV-4
      - All formal analyses
      - All governance implementation phases
