  title: KGR-006 duplicated specialist dependencies with inconsistent ER-012 boundary
  context:
    phase: GOV-5 independent evaluation
    run: KGR-006
    component: Specialist dependency source-of-truth consistency
    branch: governance/kernel-designer-revision-v0.1
