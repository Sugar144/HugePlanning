    environment: External KGR-006 output and independent evaluation
  primary_classification: PROCESS_DEFECT
  classification:
  - PROCESS_DEFECT
  - FAILURE
  severity: MEDIUM
  status: CONTAINED
  expected_behavior: Each of the four trigger-gated specialist dependencies has one
    canonical exact record or exact-field-equal duplicates across requirement and
    summary locations, including one unambiguous ER-012 safe boundary.
  observed_behavior: Requirement-level specialist_dependency records and the top-level
    specialist_dependencies array differ textually; the ER-012 top-level boundary
    blocks affected real-data processing generally while the nested boundary narrows
    the wording to a governed pilot.
  impact: The package declares parity while two formulations can change when the safe
    interim boundary applies. The independent evaluator returned the package for versioned
    correction.
  detection_method: Deterministic exact-field comparison of nested and top-level dependency
    records during independent evaluation.
  root_cause:
    immediate: The same dependency facts were authored twice without an equality invariant.
    systemic: The schema validates each record independently but does not designate
      one canonical dependency source or require duplicate equality.
    contributing_factors:
    - Markdown summaries compress dependency wording again.
    - Structural validation did not distinguish editorial differences from boundary-scope
      differences.
  response:
    containment: Keep KGR-006 unaccepted and preserve both original formulations as
      immutable evidence.
    correction: Prepare KGR-006-R1 with one canonical set of four dependencies and
      one consistent ER-012 boundary propagated to every output.
    prevention:
    - Define one canonical dependency collection and reference it from requirements
      or require exact-field equality.
    - Validate ER-007, ER-012, ER-015, and ER-019 parity across YAML and Markdown.
    - Treat safe interim boundary divergence as a blocking validation error.
    accountable_owner: Project Owner
    validation_required:
    - Assert exact equality or canonical references for all four dependencies.
    - Assert one ER-012 safe boundary across every corrected output.
    - Require new independent evaluation.
  learning:
    reusable_lesson: Duplicated governance boundaries require one canonical source
      or exact equality; schema-valid paraphrases can change operational scope.
    candidate_system_changes:
    - VALIDATION
    - SCHEMA
    - TEST
    - PROTOCOL
    applicable_future_phases:
    - GOV-5 and all specialist-dependent formal runs
