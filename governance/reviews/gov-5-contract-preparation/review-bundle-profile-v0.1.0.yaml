validations:
  - id: gov-5-contract-tests
    argv: [/tmp/hp-phase-2-1-venv/bin/python, -m, pytest, -q, -p, no:cacheprovider, governance/tests/test_gov_5_contract_preparation.py]
    cwd: .
    required: true
    timeout_seconds: 120
  - id: full-governance-suite
    argv: [/tmp/hp-phase-2-1-venv/bin/python, -m, pytest, -q, -p, no:cacheprovider, governance/tests]
    cwd: .
    required: true
    timeout_seconds: 240
  - id: kgr-006-preparation
    argv: [python3, governance/tools/prepare_enforcement_run.py, validate-preparation]
    cwd: .
    required: true
    timeout_seconds: 120
  - id: shared-package-validation
    argv: [python3, governance/tools/validate_run_package.py, --stage, preparation, --role, enforcement, --package, /tmp/HugePlanning-KGR-006-formal-input-package.zip, --envelope, governance/runs/KGR-006-enforcement-analysis/input-envelope.yaml, --prompt-snapshot, governance/runs/KGR-006-enforcement-analysis/prompt/06-enforcement-engineer-minimum-analysis-prompt-v0.1.0.md, --json]
    cwd: .
    required: true
    timeout_seconds: 120
  - id: prompt-custody
    argv: [governance/tests/run-prompt-custody-tests.sh]
    cwd: .
    required: true
    timeout_seconds: 120
  - id: learning-validation
    argv: [python3, governance/tools/manage_learning.py, validate]
    cwd: .
    required: true
    timeout_seconds: 120
  - id: strict-contract-schemas
    argv:
      - python3
      - -c
      - "from pathlib import Path; import json,jsonschema,sys; sys.path.insert(0,'governance/tools'); from _lib.strict_yaml import load; contract=load(Path('governance/runs/KGR-006-enforcement-analysis/output-contract.yaml')); schema=json.loads(Path('governance/schemas/protocols/GOV-PROTOCOL-004/0.1.0/enforcement-analysis-output-contract.schema.json').read_text()); jsonschema.Draft202012Validator(schema).validate(contract); ready=load(Path('governance/reviews/gov-5-contract-preparation/kgr-006-readiness-v0.1.0.yaml')); rs=json.loads(Path('governance/schemas/governance-validation-record.schema.json').read_text()); jsonschema.Draft202012Validator(rs).validate(ready); print('strict contracts valid')"
    cwd: .
    required: true
    timeout_seconds: 60
  - id: whitespace
    argv: [git, diff, --check]
    cwd: .
    required: true
    timeout_seconds: 60
dependencies:
  - id: python-version
    argv: [python3, --version]
    cwd: .
    required: true
    timeout_seconds: 30
  - id: test-package-versions
    argv: [/tmp/hp-phase-2-1-venv/bin/python, -c, "from importlib.metadata import version; print(f'jsonschema={version(\"jsonschema\")} pytest={version(\"pytest\")} hypothesis={version(\"hypothesis\")} PyYAML={version(\"PyYAML\")}')"]
    cwd: .
    required: true
    timeout_seconds: 30
bundle:
  root_directory: gov-5-contract-preparation-review
