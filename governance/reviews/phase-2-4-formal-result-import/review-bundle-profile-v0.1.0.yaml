    argv: [governance/tests/run-prompt-custody-tests.sh]
    cwd: .
    required: true
    timeout_seconds: 120
  - id: learning-validation
    argv: [python3, governance/tools/manage_learning.py, validate]
    cwd: .
    required: true
    timeout_seconds: 120
  - id: skill-creator-validation
    argv: [python3, /home/sugar/.codex/skills/.system/skill-creator/scripts/quick_validate.py, governance/skills/governance-result-importer]
    cwd: .
