    argv:
      - python3
      - -c
      - "from pathlib import Path; import sys; sys.path.insert(0,'governance/tools'); from apply_loop_transition import _history_records,replay; records,diags=_history_records(Path('governance/runs'),[]); assert not diags; state,counters,accepted,diags=replay(records); assert not diags; assert state=='CLOSURE_CONFIRMED'; assert counters=={'completed_targeted_closure_runs':1,'completed_designer_remediation_runs':0}; assert [x['source_run'] for x in accepted]==['KGR-005']; print('Controller replay valid')"
