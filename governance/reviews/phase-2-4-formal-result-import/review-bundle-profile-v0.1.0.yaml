      - -c
      - "from pathlib import Path; import json,jsonschema,sys; sys.path.insert(0,'governance/tools'); from _lib.strict_yaml import load; docs=[load(Path(p)) for p in ('governance/ARTIFACT_REGISTRY.yaml','governance/runs/KGR-005-kernel-adversary-targeted-closure/run-manifest.yaml','governance/runs/KGR-005-kernel-adversary-targeted-closure/controller/import-request-v0.1.0.yaml','governance/reviews/phase-2-4-formal-result-import/kgr-005-import-validation-v0.1.0.yaml','governance/reviews/phase-2-4-formal-result-import/review-bundle-profile-v0.1.0.yaml')]; jsonschema.Draft202012Validator(json.loads(Path('governance/schemas/governance-validation-record.schema.json').read_text())).validate(docs[3]); jsonschema.Draft202012Validator(json.loads(Path('governance/schemas/review-bundle-config.schema.json').read_text())).validate(docs[4]); transition=json.loads(Path('governance/runs/KGR-005-kernel-adversary-targeted-closure/controller/controller-transition.json').read_text()); jsonschema.Draft202012Validator(json.loads(Path('governance/schemas/controller-transition.schema.json').read_text())).validate(transition); print('strict YAML and JSON Schemas valid')"
    cwd: .
    required: true
    timeout_seconds: 60
  - id: whitespace-validation
    argv: [git, diff, --check]
    cwd: .
    required: true
    timeout_seconds: 60
