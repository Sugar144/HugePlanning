  - clause_id: K-003
    effect_families:
    - name: Decisive evaluation-chain independence
      routing_ids:
      - LLR-004
      - LLR-005
      - LLR-015
      - LLR-017
      - LLR-018
      prevention_implications:
      - Prevent a materially interested executor from unilaterally controlling evaluator appointment
      - claims
      - criteria
      - fixtures
      - evidence
      - context
      - method
      - interpretation
      - exceptions
      - or acceptance.
      detection_implications:
      - Detect correlated control
      - shared oracles
      - post-failure criterion changes
      - undisclosed conflicts
      - and beneficiary-selected decisive evidence.
      evidence_requirements:
      - Record functional assignments
      - conflicts
      - appointment authority
      - criteria/evidence hashes or identities
      - context
      - methods
      - interpretation
      - and final authority.
      stopping_implications:
      - Return critical or materially conflicted outcomes with prohibited control to a non-accepted state and independent
        review.
      recovery_or_compensation_implications:
      - Repeat the decisive review through a chain outside the beneficiary's unilateral control and preserve the invalidated
        outcome as evidence.
      feasibility_limits:
      - Separate identities or tools do not prove independence; hidden shared assumptions and incentives cannot be fully eliminated.
      cost_and_burden_implications:
      - Independent evaluation is a material cost and should be applied proportionally while preserving the critical floor.
      residual_risks:
      - Correlated reviewers may reach the same blind spot even with formal separation.
      reserved_human_decisions:
      - A competent human appoints the independent evaluator outside the Engineer's unilateral control and decides critical
        acceptance.
