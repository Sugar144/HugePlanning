  clauses:
  - clause_id: K-001
    effect_families:
    - name: Reserved constitutional authority and competent human decisions
      routing_ids:
      - LLR-002
      - LLR-015
      prevention_implications:
      - Prevent lower-layer or non-human exercise of reserved authority and prevent ambiguous delegation.
      detection_implications:
      - Detect missing competence
      - expiry
      - revocation
      - delegation
      - scope
      - or attributable human decision evidence.
      evidence_requirements:
      - Record authority identity
      - competence basis
      - delegation lineage
      - decision scope
      - evidence
      - limitations
      - dissent
      - and residual risk.
      stopping_implications:
      - Block ratification
      - amendment
      - C3/C4 acceptance
      - or serious/critical/constitutional risk disposition when competent authority or decision evidence is absent.
      recovery_or_compensation_implications:
      - Restore the prior valid constitutional state and disposition dependent effects; do not treat later records as retroactive
        authority.
      feasibility_limits:
      - Repository prompt and decision provenance can support attribution but cannot establish human competence or comprehension
        by itself.
      cost_and_burden_implications:
      - Human preparation and review burden rises with consequence; a compact decision packet is needed for the single-user
        context.
      residual_risks:
      - A formally attributable decision may still be uninformed
      - fatigued
      - pressured
      - or outside competence.
      reserved_human_decisions:
      - A competent human decides ratification
      - amendment
      - C3/C4 final acceptance
      - and serious/critical/constitutional residual-risk acceptance.
    - name: Fundamental architecture and constitutional-change boundary
      routing_ids:
      - LLR-003
      - LLR-010
      - LLR-011
      prevention_implications:
      - Prevent ordinary architecture
      - deviation
      - or emergency paths from creating a de facto amendment.
      detection_implications:
      - Detect material changes to authority concentration
      - autonomy
      - permissions
      - governed-effect pathways
      - topology
      - guarantees
      - or cumulative exception effect.
      evidence_requirements:
      - Preserve architecture-impact analysis
      - exception and emergency lineage
      - cumulative effect
      - and competent disposition.
      stopping_implications:
      - Keep disputed fundamental changes and dependent work blocked pending constitutional disposition.
      recovery_or_compensation_implications:
      - Return to the last valid constitutional basis or route an explicit amendment; contain any already-produced effects.
      feasibility_limits:
      - Borderline architecture classification requires contextual human judgment and cannot be settled by filenames or change
        size.
      cost_and_burden_implications:
      - Impact assessment is material work but should be limited to changes plausibly affecting protected dimensions.
      residual_risks:
      - Strategic framing may present a fundamental change as ordinary or temporary.
      reserved_human_decisions:
      - A competent constitutional authority decides disputed fundamental classification and any amendment.
    requirements:
    - id: ER-001
      kind: DERIVED_REQUIREMENT
      statement: Define evidence requirements for current competent authority, delegation, expiry, revocation, reserved-category
        routing, and attributable human decisions without delegating constitutional authority.
      timing: MUST_BEFORE_RATIFICATION
      lower_layers:
      - policy
      - standard
      - evidence
      - human_judgment
      capability_status: PARTIAL
      evidence_refs:
      - kernel/03-kernel-clauses-v0.2.yaml#K-001
      - revision/05-lower-layer-routing-v0.2.md#authority-identity
      - closure/05-residual-risk-and-routing.md#RR-001
      - methodology/project-operating-contract.md
      feasibility_limit: Bound prompts and authority fields show provenance patterns but do not establish a complete competence,
        delegation, expiry, or revocation registry.
      cost_and_burden: Requires a compact authority and decision record for each reserved decision; human comprehension remains
        irreducible.
      residual_risk: Formal identity evidence can coexist with misunderstanding, pressure, or incompetence.
      reserved_human_decision: The Project Owner must identify the competent ratification owner and the exact proposed scope
        presented for decision.
      scope_posture: CURRENT_SINGLE_USER_MINIMUM
      specialist_dependency_id: null
    - id: ER-002
      kind: DERIVED_REQUIREMENT
      statement: Require an impact basis that distinguishes ordinary architecture work from changes to authority, autonomy,
        governed-effect pathways, canonical/evaluation topology, or constitutional guarantees.
      timing: MUST_BEFORE_GOVERNED_PILOT
      lower_layers:
      - policy
      - evidence
      - human_judgment
      capability_status: GAP
      evidence_refs:
      - kernel/03-kernel-clauses-v0.2.yaml#K-001
      - revision/05-lower-layer-routing-v0.2.md#fundamental-architecture-effect-classifier
      - closure/05-residual-risk-and-routing.md#RR-013
      feasibility_limit: No bound artifact supplies tested borderline examples or a current architecture-effect classifier.
      cost_and_burden: Apply only to plausibly material architecture changes; routine changes should not carry bespoke constitutional
        review.
      residual_risk: A beneficiary may frame a fundamental change as routine.
      reserved_human_decision: Competent constitutional authority decides disputed fundamental changes.
      scope_posture: CURRENT_SINGLE_USER_MINIMUM
      specialist_dependency_id: null
    - id: ER-003
      kind: DERIVED_REQUIREMENT
      statement: Require a comprehensible human decision packet binding exact scope, canonical evidence, limitations, contradictions
        or dissent, and residual risks.
      timing: MUST_BEFORE_RATIFICATION
      lower_layers:
      - standard
      - evidence
      - human_judgment
      capability_status: PARTIAL
      evidence_refs:
      - kernel/03-kernel-clauses-v0.2.yaml#K-001
      - adversarial/05-enforcement-concerns.md#human-decision-packet
      - closure/05-residual-risk-and-routing.md#RR-011
      feasibility_limit: Existing governance artifacts preserve provenance and limitations but do not demonstrate decision-packet
        usability under realistic attention constraints.
      cost_and_burden: The packet should be one bounded decision basis, not a new document suite.
      residual_risk: Completeness does not guarantee comprehension.
      reserved_human_decision: The competent human chooses return, rejection, or separate ratification after independent evaluation.
      scope_posture: CURRENT_SINGLE_USER_MINIMUM
      specialist_dependency_id: null
