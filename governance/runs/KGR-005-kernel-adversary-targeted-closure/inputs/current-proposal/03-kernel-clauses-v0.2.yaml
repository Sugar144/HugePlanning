kernel:
  id: hugeplanning-meta-kernel
  project: HugePlanning
  version: 0.2.0-proposed
  status: PROPOSED
  authority: pending_human_ratification
  scope: HugePlanning level 3
  date: '2026-07-14'
  language: English
  revision_run: KGR-004
  baseline_run: KGR-002
  adversarial_run: KGR-003
  ratified: false
  enforceable: false
  operational: false
  constitutional_authority: competent_human_ratification_owner
  non_scope:
  - Freelancer Project level 2 unless explicitly adopted
  - client projects level 1 unless explicitly adopted
  - delivered products level 0 unless explicitly adopted
  authority_hierarchy_upon_ratification:
  - ratified_kernel
  - explicit_current_human_decisions_made_within_constitutional_authority
  - current_policies
  - stage_and_task_contracts
  - canonical_repository_documentation
  - agent_and_skill_instructions
  - local_execution_interpretation
  scope_rules:
  - This Kernel governs HugePlanning at system level 3.
  - It does not automatically govern Freelancer Project at level 2, client projects at level 1, or delivered products
    at level 0; those systems require explicit adoption by competent authority and compatible lower-layer governance.
  - It applies by function and governed effect, regardless of whether a human, model, tool, script, service, session,
    workflow, or combination performs the work.
  - Policies, standards, procedures, contracts, configurations, evaluations, and enforcement mechanisms may refine
    constitutional properties but must not contradict, silently weaken, or redefine their applicability.
  interpretation:
    authority_and_precedence: A lower layer MAY specialize a higher rule but MUST NOT contradict it, silently weaken
      it, or decide that a constitutional reservation is unnecessary. An ordinary instruction, including an ordinary
      human instruction, MUST NOT amend the Kernel. A same-level source supersedes another only when applicability,
      version, and replacement are explicit or otherwise demonstrable. An unresolved same-authority conflict MUST
      remain BLOCKED and receive accountable disposition under K-007.
    normative_language: MUST and MUST NOT express constitutional requirements or prohibitions. SHOULD and SHOULD
      NOT express strong expectations that require recorded justification when departed from. MAY expresses constitutionally
      permitted discretion and does not itself grant operational authorization.
    functional_interpretation: Proposal, decision, authorization, execution, validation, evaluation-chain control,
      exception approval, acceptance, release, and ratification are distinct functions. One person or component
      MAY perform more than one function when criticality and conflict controls permit, but labels, separate chats,
      repeated runs, or different tools alone do not establish meaningful independence.
    technology_independence: Constitutional meaning MUST remain independent of named providers, models, tools, commands,
      prompts, repository layouts, and implementation techniques. Substitution does not require constitutional redesign
      unless it changes authority, governed effects, or constitutional guarantees; no substitution may be treated
      as control-equivalent without capability evidence for the applicable effect classes.
    honest_state_and_uncertainty: BLOCKED, PAUSED, INCONCLUSIVE, READY_FOR_EVALUATION, ACCEPTED_WITH_LIMITATIONS,
      FAILED, and ABRUPT_TERMINATION are legitimate non-success or qualified states when their conditions are honestly
      met. READY_FOR_EVALUATION is not ACCEPTED; INCONCLUSIVE is not PASS; FAILED is non-accepted. Absence of a
      detected problem is not proof of compliance, authorization, acceptance, or recoverability.
    governed_effects: A governed effect includes a state change and any constitutionally significant non-state-changing
      effect, including sensitive access, collection, disclosure, or external transmission; material resource or
      cost commitment; external communication or exposure; and an output that acquires canonical, authorization,
      evaluation, acceptance, or release authority. Genuinely harmless local reading or analysis may receive lighter
      controls when it creates none of those effects.
    materiality_and_cumulative_effect: A matter is material when it can change committed intent, authority, mandatory
      criteria, criticality, protected assets, external impact, acceptance, propagation, control capability, or
      recoverability. Materiality MUST be assessed over related effects across actors, branches, stages, releases,
      systems, and time; subdivision or a new record does not reset cumulative effect.
    managed_nonprogress_states: Every material BLOCKED, PAUSED, INCONCLUSIVE, or higher-provisional state MUST identify
      an accountable owner, reason, affected dependency, and a next review condition or explicit terminal disposition.
      Safety may require continued blocking without a forced deadline to proceed, but the state MUST NOT become
      unowned abandonment.
    constitutional_violation_handling: A suspected constitutional violation MUST block every dependent governed
      transition or effect that relies on the disputed authority, evidence, result, or control. Relevant state and
      evidentiary integrity MUST be preserved under K-004, the issue MUST be escalated and owned, and acceptance
      or release MUST NOT be inferred. Containment MAY proceed under K-007. Unrelated work that is demonstrably
      independent and conformant is not automatically invalidated.
  honest_states:
  - BLOCKED
  - PAUSED
  - INCONCLUSIVE
  - READY_FOR_EVALUATION
  - ACCEPTED_WITH_LIMITATIONS
  - FAILED
  - ABRUPT_TERMINATION
  current_declaration: PROPOSED_NOT_RATIFIED
clauses:
- id: K-001
  title: Constitutional Sovereignty and Governed Amendment
  normative_statement: Only competent human constitutional authority MAY ratify or amend this Kernel; transfer ratification
    authority; change the authority hierarchy; redefine HugePlanning’s fundamental purpose or scope; approve a fundamental
    architecture change when it materially changes authority concentration, maximum autonomy or permissions, governed-effect
    pathways, canonical-control topology, evaluation or acceptance topology, or constitutional guarantees; increase
    maximum autonomy or permissions; reduce constitutional validation or security protections; make final acceptance
    decisions for C3 or C4 work; or accept serious, critical, or constitutional residual risk. A lower layer MUST
    NOT redefine, relabel, automate, or narrow any reserved category so as to remove this human authority. Changing
    a reserved boundary requires constitutional amendment. The system MAY analyze and propose such changes, but
    MUST NOT authorize, ratify, conceal, or enact them through ordinary policy, architecture, contracts, implementation,
    emergency action, classification, or its own outputs. Every amendment MUST be explicit, versioned, impact-assessed,
    independently challenged, considered for enforceability and migration, and humanly ratified before acquiring
    constitutional authority.
  rationale: Constitutional legitimacy fails if the governed system can enlarge its authority, decide that a human-only
    gate is unnecessary, or create equivalent constitutional change through architecture, classification, emergency,
    or ordinary work.
  scope:
  - Kernel ratification, amendment, supersession, and transfer of constitutional authority.
  - Fundamental purpose and scope.
  - Architecture changes only when they materially alter authority, autonomy, governed-effect pathways, canonical
    or evaluation topology, or constitutional guarantees.
  - Maximum autonomy, permissions, constitutional protections, C3/C4 final acceptance, and serious/critical/constitutional
    residual-risk acceptance.
  - Temporary or emergency arrangements whose cumulative effect could become constitutional.
  protected_properties:
  - Human sovereignty
  - Constitutional legitimacy
  - Controlled evolution
  - Non-self-amendment
  - Meaningful human control
  addresses_hazards:
  - HZ-002
  - HZ-008
  - HZ-012
  - HZ-018
  relationship_to_other_clauses: K-002 bounds delegated effects. K-003 prevents indirect or interested self-approval.
    K-004 and K-005 preserve the authentic basis and informed evidence for amendment and acceptance. K-006 cannot
    lower this clause’s floors. K-007 permits containment but not de facto amendment.
  constitutional_violation_effect: An unratified constitutional change or non-human exercise of reserved authority
    has no constitutional force. Dependent execution, acceptance, delegation, release, or continuing governance
    MUST remain BLOCKED; the prior valid constitutional state controls until competent human ratification or disposition.
  exception_posture: No ordinary exception is allowed. Immediate containment MAY reduce effects under K-007, but
    it MUST NOT amend the Kernel, exercise reserved acceptance authority, permanently weaken protections, or become
    normal governance through serial renewal.
  review_triggers:
  - Proposed Kernel amendment, supersession, or transfer of ratification authority.
  - Change to fundamental purpose or scope.
  - Architecture change with a material effect on authority, autonomy, governed-effect pathways, canonical or evaluation
    topology, or guarantees.
  - Increase in maximum autonomy, permissions, or external-effect capacity.
  - Reduction of constitutional validation or security protections.
  - C3/C4 final acceptance or acceptance of serious, critical, or constitutional residual risk.
  - Continuing exception or emergency state with cumulative constitutional effect.
- id: K-002
  title: Bounded Authority and Effects
  normative_statement: Every action capable of a governed effect MUST be covered by explicit, current, and competent
    authorization proportional to that effect and bounding its objective, target, scope, permissions, data and resources,
    permitted effects, conditions, criticality, validation obligations, and stop or escalation boundary. This requirement
    applies to state changes and to constitutionally significant non-state-changing effects. An actor MUST NOT expand,
    reinterpret, transfer, or reuse authorization after a material basis or effect class changes, and MUST NOT increase
    its own permissions or lower its own criticality. Broad standing language, silence, missing controls, technical
    capability, prior success, or possession of credentials MUST NOT absorb an unknown or materially changed effect.
    Unknown, unclassified, or unauthorized governed effects MUST remain BLOCKED. Genuinely harmless local investigation
    MAY continue only when permitted, bounded, and not increasing the disputed or protected effect.
  rationale: Capability and syntactic read-only status are not authority. Sensitive access, transmission, cost,
    external exposure, or authoritative outputs can be consequential without mutating the target system.
  scope:
  - All state-changing work and all constitutionally significant non-state-changing effects.
  - Canonical artifacts, code, configuration, schemas, evaluators, workflows, permissions, releases, external systems,
    sensitive data, external communications, and resource commitments.
  - Outputs that acquire governed authority or become a basis for decision, acceptance, or release.
  - Standing and delegated authorization, material scope changes, and unknown action or effect classes.
  protected_properties:
  - Bounded authority
  - Least necessary privilege and effect
  - Explicit delegation
  - Controlled externality
  - Safe escalation
  addresses_hazards:
  - HZ-008
  - HZ-011
  - HZ-012
  - HZ-016
  relationship_to_other_clauses: K-001 defines non-delegable powers. K-003 constrains decisive evaluation and acceptance
    control. K-006 aggregates related effects. K-007 stops work when authorization or control is insufficient.
  constitutional_violation_effect: The affected action or effect and every dependent transition MUST be treated
    as unauthorized and BLOCKED. Effects already produced MUST be contained, recorded, and recovered, compensated,
    or explicitly dispositioned by competent authority before any acceptance.
  exception_posture: A temporary deviation MAY be authorized only by the competent owner of the governing rule,
    with explicit scope, rationale, risk, compensating controls, an objectively bounded termination condition, review
    conditions, cumulative lineage, and actual-effect record. Renewal MUST be assessed cumulatively and MUST NOT
    reset duration or effect. A deviation cannot waive K-001, permit prohibited self-approval under K-003, or convert
    silence into consent.
  review_triggers:
  - New actor, capability, permission, autonomy level, governed-effect class, data class, or external destination.
  - Material scope, authorization, data, cost, or effect change.
  - Standing authorization reused under changed conditions.
  - Unclassified action/effect or disputed criticality.
  - Unauthorized effect, credential exposure, broad read-only claim, or repeated/renewed deviation.
- id: K-003
  title: Functional Independence and Non-Self-Certification
  normative_statement: Proposal, decision, authorization, execution, validation, evaluator appointment, claim and
    rubric ownership, evidence selection, context construction, method selection, decisive interpretation, exception
    approval, acceptance, release, and ratification MUST remain distinguishable and MUST be separated to the degree
    required by criticality, conflict of interest, and consequence. For critical or materially conflicted work,
    a benefiting or materially interested executor MUST NOT unilaterally control the decisive evaluation chain,
    including the evaluator, gate claim, blocking criteria, fixtures or evidence set, context, method, interpretation,
    exception, and acceptance. The executor MUST NOT lower criticality, weaken criteria directly or indirectly,
    approve its own exception, accept its own critical work, or ratify its own constitutional proposal. Independence
    claims MUST consider shared context, criteria, evidence, methods, tools, incentives, selection authority, and
    final decision authority; nominal separation alone is insufficient.
  rationale: A separate evaluator identity does not prevent self-certification when the beneficiary controls what
    is evaluated, by whom, with which evidence and method, and how the result is interpreted.
  scope:
  - Criterion, fixture, evidence-source, claim, and rubric ownership or modification.
  - Evaluator appointment, context, methods, evidence inclusion, and decisive interpretation.
  - Criticality classification and reduction.
  - Validation, exception approval, acceptance, release, ratification, and critical implementation.
  - Independence claims across humans, models, tools, sessions, and methods.
  protected_properties:
  - Evaluation legitimacy
  - Conflict-of-interest control
  - Non-self-certification
  - Independent risk acceptance
  - Separation of constitutional functions
  addresses_hazards:
  - HZ-002
  - HZ-003
  - HZ-007
  - HZ-008
  relationship_to_other_clauses: K-001 reserves human constitutional and C3/C4 authority. K-004 preserves criteria
    and evaluation-control provenance. K-005 binds evidence to the real gate and requires informed reserved acceptance.
    K-006 scales separation without waiving the critical floor.
  constitutional_violation_effect: A validation, exception, acceptance, release, or ratification outcome produced
    through prohibited beneficiary control or correlated self-certification MUST NOT be relied upon. It MUST return
    to an honest non-accepted state and be reviewed through a decisive chain outside the beneficiary’s unilateral
    control.
  exception_posture: Functions MAY be consolidated for low-criticality work when policy demonstrates no material
    conflict and objective gates remain outside the beneficiary’s unilateral control. No exception permits self-ratification,
    self-approved critical exceptions, beneficiary-controlled decisive evaluation of critical work, or non-human
    exercise of K-001 reserved authority.
  review_triggers:
  - Criterion, fixture, evidence source, claim, rubric, context, or method change after failure or execution begins.
  - Executor selects or materially constrains the decisive evaluator.
  - Same function fixes, evaluates, and accepts critical work.
  - Evaluators share a material oracle, context, source, method, incentive, or authority.
  - Criticality reduction or exception proposed by its beneficiary.
  - New delegation of acceptance, release, or evaluator-selection authority.
- id: K-004
  title: Canonical Intent, Provenance, and Epistemic Integrity
  normative_statement: Governed intent, decisions, requirements, criteria, claims, evidence, assumptions, evaluation-control
    records, and state MUST have identifiable canonical authority and traceable provenance. Canonical authority
    MAY be composite or distributed only when authoritative boundaries, composition, and conflict resolution are
    explicit. Facts, human decisions, proposals, assumptions, inferences, open questions, evidence gaps, retrospective
    reconstructions, and validation results MUST remain distinguishable and MUST NOT be silently promoted, merged,
    rewritten, or represented as one another. Competing authoritative sources MUST be reconciled through applicability,
    version, material-fidelity evidence, and explicit supersession; unresolved equal-authority conflict MUST remain
    visible and BLOCKED. A summary or migration MUST NOT replace a primary source as canonical authority unless
    material intent and provenance are demonstrably preserved. Material assumptions supporting governed effects
    or acceptance MUST have an accountable owner and a validity or revalidation condition; materially stale, contradicted,
    or expired assumptions MUST block dependent gates. Historical evidence and compliance MUST NOT be fabricated
    retroactively. Evidentiary integrity and the maximum safe provenance MUST be preserved. Competent legal, privacy,
    security, or active-harm authority MAY require documented least-loss redaction, isolation, minimization, cryptographic
    or equivalent attestation, or deletion of raw evidence, but the reason, scope, authority, timing, confidence
    impact, and safest available decision record MUST remain traceable.
  rationale: Canonical truth fails both when evidence is silently rewritten and when absolute raw retention creates
    unlawful or dangerous persistence. Integrity requires provenance, semantic fidelity, current assumptions, and
    accountable least-loss handling.
  scope:
  - Requirements, decisions, assumptions, claims, evidence, criteria, states, hazards, defects, evaluation-control
    records, and learning.
  - Canonical artifacts, composite authorities, primary sources, derived summaries, views, and migrations.
  - Versioning, supersession, semantic-fidelity evidence, retrospective reconstruction, retention, redaction, isolation,
    minimization, and deletion.
  - Conversations and temporary working material used as supporting evidence.
  protected_properties:
  - Intent preservation
  - Canonical truth
  - Provenance and traceability
  - Assumption currency and integrity
  - Historical honesty
  - Safe evidence lifecycle
  addresses_hazards:
  - HZ-001
  - HZ-006
  - HZ-012
  - HZ-015
  - HZ-018
  relationship_to_other_clauses: K-005 relies on canonical objectives, criteria, claims, and evidence. K-002 relies
    on canonical authorization. K-001 relies on authentic amendment and human-decision records. K-007 preserves
    or safely handles state and evidence during interruption and containment.
  constitutional_violation_effect: A dependent decision, implementation, evaluation, acceptance, release, or governed
    effect MUST NOT proceed while a material canonical conflict, provenance failure, stale material assumption,
    unsafe evidence condition, or epistemic misclassification remains unresolved. Disputed material MUST be marked
    and handled without invented reconciliation; confidence loss from redaction or deletion MUST remain explicit.
  exception_posture: Temporary copies, summaries, caches, and working views MAY exist when their status and canonical
    reference are clear. Least-loss evidence handling MAY occur only under competent authority and documented necessity.
    No exception permits fabricated evidence, silent supersession, unrecorded cleanup, concealment of evidence loss,
    or promotion of an assumption, inference, or retrospective reconstruction into a contemporaneous human decision
    or fact.
  review_triggers:
  - Conflicting or duplicated authoritative sources or composite-authority ambiguity.
  - Summary, generated artifact, or migration proposed as canonical authority.
  - Missing provenance or semantic-fidelity evidence for a material decision, criterion, claim, or result.
  - Material assumption approaching or exceeding its validity/revalidation condition, or becoming contradicted.
  - Retrospective reconstruction or historical regularization.
  - Evidence redaction, isolation, deletion, replacement, unexplained loss, or privacy/security conflict.
- id: K-005
  title: Evidence-Grounded State and Acceptance
  normative_statement: 'Every material claim, validation outcome, completion state, acceptance decision, release
    decision, compliance declaration, reversibility claim, and adoption-state declaration MUST be supported by evidence
    sufficient for the canonical authorized objective, the exact gate claim, accepted scope, mandatory criteria,
    material dependencies, criticality, uncertainty, and decision authority involved. A narrow claim MAY receive
    a narrow PASS, but MUST NOT imply broader completion, compliance, release, or acceptance. Artifact existence,
    creator assertion, structural validity alone, or absence of detected failure MUST NOT establish purpose satisfaction.
    READY_FOR_EVALUATION MUST precede acceptance where evaluation is required; INCONCLUSIVE MUST NOT be treated
    as PASS; missing or materially contradictory essential evidence MUST remain explicit and block the affected
    gate. Acceptance MUST be made only by competent authority. Where K-001 reserves human acceptance, the decision
    MUST be informed and attributable: the accepted scope, material evidence, limitations, contradictory evidence
    or dissent, and residual risk MUST be presented in a comprehensible decision basis. Known limitations and residual
    risk MUST remain attached to the accepted scope.'
  rationale: Strong evidence for an underscoped claim or a ceremonial human click can still produce false completion.
    Gate legitimacy requires traceability from purpose to claim, evidence, authority, and accepted scope.
  scope:
  - Validation, evaluation, acceptance, release, compliance, reversibility, recovery, and adoption-state claims.
  - Completion and state transitions, local versus gate-level PASS, and material dependencies.
  - Retrospective evidence and migration status.
  - Qualified acceptance, recurring limitations, human decision basis, and residual-risk records.
  protected_properties:
  - Evidence integrity
  - Honest and scoped completion state
  - Purpose-to-claim traceability
  - Informed acceptance legitimacy
  - Non-fabricated compliance
  addresses_hazards:
  - HZ-002
  - HZ-003
  - HZ-007
  - HZ-014
  - HZ-018
  relationship_to_other_clauses: K-003 protects the decisive evaluation chain. K-004 supplies canonical objectives,
    claims, evidence, and provenance. K-006 scales evidence without reducing mandatory purpose coverage. K-007 prevents
    interruption or recovery claims from becoming acceptance accidentally.
  constitutional_violation_effect: The affected result MUST NOT cross its gate or retain an unsupported accepted
    state. It MUST return to READY_FOR_EVALUATION, INCONCLUSIVE, BLOCKED, FAILED, or another honest non-accepted
    and correctly scoped state until competent review establishes a justified outcome.
  exception_posture: ACCEPTED_WITH_LIMITATIONS MAY be used only by competent authority when limitations, scope,
    residual risk, owner, and review or disposition condition are explicit and no mandatory constitutional control,
    mandatory criterion, or canonical core purpose is violated. Repeated or materially related limitations MUST
    be aggregated and reassessed; renewal or claim narrowing MUST NOT normalize core failure. Missing essential
    evidence, unacceptable serious risk, invalid downstream dependence, core-purpose failure, or fatigue MUST NOT
    be converted into qualified acceptance.
  review_triggers:
  - Gate crossing based on file existence, creator assertion, or a narrower local PASS.
  - Claim not traceable to canonical objective, mandatory criteria, accepted scope, or material dependencies.
  - Contradictory or insufficient essential evidence.
  - INCONCLUSIVE, FAILED, or ACCEPTED_WITH_LIMITATIONS state; especially repeated limitations.
  - Change to mandatory criteria, fixture, rubric, evidence source, evaluator context, or gate claim.
  - High-consequence human acceptance without an attributable comprehensible decision basis.
  - Retrospective compliance, reversibility, recovery, RATIFIED, ENFORCEABLE, OPERATIONAL, or MATURE claim.
- id: K-006
  title: Proportional Governance and Justified Complexity
  normative_statement: Governance, authorization, validation, independence, observability, stopping, recovery, and
    human review MUST be proportional to the actual, cumulative, uncertain, and potentially external effects of
    governed work, subject always to the fixed floors of the other clauses. Related actions MUST be classified and
    controlled by combined intent, capability, release, affected system, propagation, and effect across actors,
    branches, stages, releases, and time, and MUST NOT be fragmented or rerecorded to evade stronger controls. Material
    uncertainty MUST use the higher reasonable provisional level until evidence supports reduction and MUST be managed
    under K-007. A material, recurring, permanent, or contested governance burden MUST have a proportional rationale
    showing protective value over a simpler adequate alternative. The proponent of the burden supplies that rationale.
    Removing or weakening an existing protection MUST independently show that the simpler alternative remains adequate.
    Minor or transient controls MUST NOT require bespoke recursive proof unless their cumulative burden becomes
    material. Governance SHOULD be simplified when evidence shows cost without necessary protection, but cost alone
    MUST NOT waive a constitutional floor.
  rationale: Uniform maximum control makes a solo system unusable, while local classification and recursive proof
    demands can either hide risk or create bureaucracy. Proportional rationale must focus on material burden and
    preserve constitutional floors.
  scope:
  - Criticality, aggregation, uncertainty, and control selection across actors, branches, stages, releases, and
    time.
  - Validation depth, independence, human gates, observability, stopping, and recovery requirements.
  - Material, recurring, permanent, or contested governance artifacts, agents, skills, workflows, reviews, and platforms.
  - Calibration and simplification of lower-layer controls without recursive proof for every minor control.
  protected_properties:
  - Proportional control
  - Anti-fragmentation
  - Honest managed uncertainty
  - Solo maintainability
  - Justified complexity and anti-overplanning
  addresses_hazards:
  - HZ-004
  - HZ-005
  - HZ-008
  - HZ-010
  - HZ-016
  relationship_to_other_clauses: K-001 fixes non-delegable floors. K-002 applies authorization to governed effects.
    K-003 scales independence. K-005 scales evidence while preserving purpose coverage. K-007 owns higher-provisional
    and blocked states. K-006 MUST NOT waive another clause’s essential protection.
  constitutional_violation_effect: Work suspected of under-classification, fragmentation, rerecording, or materially
    uncertain effect MUST be provisionally governed at the higher reasonable level and MUST NOT cross the affected
    gate until reviewed. Governance found materially burdensome without protective value SHOULD be simplified at
    the appropriate lower layer, while removal of protection requires evidence that the replacement remains adequate.
  exception_posture: Lower layers MAY calibrate levels, thresholds, examples, sampling, and mechanisms. No exception
    permits hiding cumulative effect, treating material uncertainty as certainty, using cost alone to waive another
    clause, or demanding recursive bespoke proof for every minor control. Emergency response MAY temporarily apply
    stronger controls subject to K-007 cumulative disposition.
  review_triggers:
  - New effect class, actor, capability, autonomy level, external dependency, or provider capability change.
  - Related low-risk changes with a larger cumulative outcome across branches, actors, stages, releases, or time.
  - Criticality dispute, repeated reclassification, or prolonged higher-provisional state.
  - Controls repeatedly bypassed, ineffective, or materially more costly than their protective value.
  - Proposal for a permanent agent, workflow, document class, governance platform, or recurring proof obligation.
  - Serious incident, repeated defect, material INCONCLUSIVE result, or evidence that simplification would weaken
    a floor.
- id: K-007
  title: Safe Stopping, Observability, Continuity, and Recovery
  normative_statement: Governed work MUST stop, pause, or remain BLOCKED before further governed effect when required
    authority, canonical input, classification, context, essential evidence, control capacity, or recovery basis
    is absent, conflicting, exhausted, corrupted, or materially uncertain, or when continuation would violate a
    higher rule. Harmless investigation MAY continue only when authorized, bounded, and not increasing a disputed
    or protected effect. Every material BLOCKED, PAUSED, INCONCLUSIVE, or higher-provisional state MUST have an
    accountable owner, reason, affected dependencies, and a next review condition or explicit terminal disposition.
    Continued blocking is valid while safety requires it; no automatic deadline may force unsafe progress, but a
    new record or repeated escalation MUST NOT conceal abandonment. Significant work MUST externalize sufficient
    state and evidence to reconstruct its objective, authority, inputs, governed effects, validations, current status,
    limitations, and exact continuation or recovery boundary. Recovery and reversibility claims MUST be evidence-based,
    proportional to risk, and distinguish restoration from compensation for disclosures, costs, communications,
    or other irreversible external effects. Abrupt termination, ambiguous residual state, or failed recovery MUST
    NOT imply acceptance and MUST trigger safe evidence handling, classification, containment, and authorized resumption,
    compensation, reversion, or terminal disposition.
  rationale: Safety requires both stopping before uncontrolled effects and accountable liveness. A blocked state,
    emergency, or rollback claim is not safe merely because it is recorded; it must remain owned, reconstructable,
    and honestly dispositioned.
  scope:
  - Stop, pause, block, interruption, checkpoint, resumption, containment, terminal disposition, and recovery.
  - State-changing and constitutionally significant non-state-changing effects, external effects, long executions,
    and resource-bounded work.
  - Ownership and lifecycle of BLOCKED, PAUSED, INCONCLUSIVE, higher-provisional, emergency, and abrupt-termination
    states.
  - Reconstruction of authorization, effects, validation, evidence handling, final state, restoration, and compensation.
  protected_properties:
  - Safe stopping
  - Accountable liveness
  - Continuity and resumability
  - Observability and reconstructability
  - Integrity-preserving containment
  - Evidence-based restoration and compensation
  addresses_hazards:
  - HZ-001
  - HZ-005
  - HZ-008
  - HZ-012
  - HZ-013
  - HZ-014
  relationship_to_other_clauses: K-002 supplies the governed-effect authorization boundary. K-004 controls safe
    evidence preservation and least-loss handling. K-005 controls recovery and acceptance claims. K-006 scales controls
    and aggregates repeated blocked or emergency states. K-001 prevents emergency or continuation from becoming
    amendment.
  constitutional_violation_effect: Further dependent governed effect MUST cease. Written, external, or authoritative
    outputs MUST remain unvalidated until reconstructed and reviewed; relevant evidentiary integrity MUST be handled
    under K-004; containment and recovery or compensation MUST proceed under competent authority. An unowned stale
    blocked state or failed recovery MUST be treated as an incident, not hidden, reset, or relabeled as success.
  exception_posture: Immediate containment MAY precede normal workflow authorization only when necessary to stop
    active harm. It MUST use the least effect reasonably available, preserve the maximum safe evidence and decision
    record under K-004, be recorded, owned, and reviewed cumulatively, and move to normal authority, terminal disposition,
    or formal amendment when its continuing governance effect becomes material or enduring. A new emergency record
    MUST NOT reset cumulative duration or effect. Containment MUST NOT exercise K-001 reserved authority, conceal
    evidence loss, or create indefinite unowned risk acceptance.
  review_triggers:
  - Abrupt termination, missing terminal state, or ambiguous residual effect.
  - Exhausted or unreliable context, time, cost, compute, attention, or execution budget.
  - Unowned, stale, repeatedly renewed, or repeatedly escalated BLOCKED/PAUSED/INCONCLUSIVE/higher-provisional state.
  - Missing checkpoint or inability to reconstruct significant work.
  - Failed rollback, restoration, compensation, or recovery claim; or an irreversible external effect.
  - New sensitive, external, or authoritative-output effect class.
  - Continuing emergency containment or deviation with cumulative material effect.
amendment_relationship:
- This proposal MAY be challenged, revised, rejected, or ratified only through the governance sequence appropriate
  to constitutional work.
- Before ratification it MUST receive independent targeted adversarial closure and subsequent enforcement analysis
  sufficient to expose remaining ambiguity, bypasses, capability gaps, costs, and migration consequences.
- A future amendment MUST identify affected clauses, alternatives, hazards, compatibility effects, lower-layer consequences,
  migration needs, and evidence used.
- Ratification creates constitutional authority only for the explicitly approved version. Later policies, contracts,
  architecture, classifications, tools, or emergencies MUST NOT be treated as implicit amendments.
- A superseded Kernel version and its amendment record MUST remain traceable under K-004.
adoption_states:
  RATIFIED: Competent human constitutional approval of the explicitly identified Kernel version.
  ENFORCEABLE: For an explicitly defined scope and set of governed-effect classes, the constitutionally applicable
    combination of prevention, detection, evidence, stopping, and recovery or compensation capabilities has demonstrable
    coverage; any inapplicable control family is justified; and the declaration is supported by independent evidence.
    ENFORCEABLE is scoped and cannot be inferred from one mechanism.
  OPERATIONAL: The ratified and enforceable Kernel has been used successfully in a real governed flow within its
    declared scope and has been declared operational by competent human authority using independent evidence.
  MATURE: Accumulated evidence supports stability, effectiveness, portability limits, and reasonable cost within
    an explicit scope.
