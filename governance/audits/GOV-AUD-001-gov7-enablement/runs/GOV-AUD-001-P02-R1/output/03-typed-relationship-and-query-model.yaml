  query_result_contract:
    required_fields: [query_id, query_version, source_snapshot, generated_at, paths, direct_results, probable_results, unknown_results, provenance, limitations]
    impact_classes:
      DIRECT: A validated typed path reaches the target using authoritative source identifiers.
      PROBABLE: Evidence indicates dependency or shared contract but the typed path is incomplete or applicability is conditional.
      UNKNOWN: Provenance, endpoint, compatibility or applicability is missing or stale.
    empty_result_semantics: EMPTY_IS_NOT_PROOF_OF_NO_IMPACT_UNLESS_COVERAGE_VALIDATION_PASSED
  validation_rules:
    - {rule_id: RM-VAL-001, statement_label: PROPOSAL, rule: Entity kinds and relationship type names are unique.}
    - {rule_id: RM-VAL-002, statement_label: PROPOSAL, rule: Every relationship endpoint kind exists and every query traversal names a declared relationship type.}
    - {rule_id: RM-VAL-003, statement_label: PROPOSAL, rule: Every required query coverage tag appears exactly once.}
    - {rule_id: RM-VAL-004, statement_label: PROPOSAL, rule: Relationship projections carry provenance, source versions and explicit authority DERIVED_NON_AUTHORITATIVE.}
    - {rule_id: RM-VAL-005, statement_label: PROPOSAL, rule: No projection or query result may write to authoritative sources.}
    - {rule_id: RM-VAL-006, statement_label: PROPOSAL, rule: Unknown impact and compatibility remain visible and cannot be coerced to no impact or supported.}
    - {rule_id: RM-VAL-007, statement_label: PROPOSAL, rule: Supersession is acyclic and historical entities remain resolvable.}
    - {rule_id: RM-VAL-008, statement_label: PROPOSAL, rule: Decision and constitutional authority cannot be inferred by traversal.}
