        current_burden: {value: UNKNOWN, basis: later operational burden is unmeasured}
        failure_risk: {value: 4, basis: stale assumptions or fragmented claims can support an invalid acceptance decision}
        score: UNKNOWN
      preliminary_leverage: UNKNOWN
      leverage_status: PROVISIONAL_FOR_PASS_04_AND_PASS_05
      confidence: HIGH
      missing_data_markers:
        - actual assumption churn, claim volume and review burden are UNKNOWN
      qualification: Repository custody patterns are reusable partial evidence; a general cross-layer capability is not demonstrated.
      neutral_capability_need_class: QUERY_CAPABILITY_CANDIDATE
      priority: P1_FIRST_APPROVED_IMPLEMENTATION_INCREMENT
      dependencies: [ER-009, ER-011, ER-014, CAP-003]
      unresolved_questions:
