      statement_label: VERIFIED_FACT
      classification: REQUIREMENT_WITHOUT_IMPLEMENTATION
      problem: ER-009 is partial, while ER-011 and ER-014 lack general implementation evidence for assumption validity, objective-to-gate lineage and recurring/qualified non-success aggregation.
