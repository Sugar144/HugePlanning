        - governance/runs/KGR-006-R1-enforcement-analysis-correction/outputs/03-feasibility-coverage-and-gap-assessment.md
      evidence_priority:
        frequency: {value: UNKNOWN, basis: no bounded governed pilot has produced occurrence data}
        current_burden: {value: UNKNOWN, basis: implementation and operational burden are not observed}
        failure_risk: {value: 5, basis: unknown or cumulative governed effects can bypass intended authority boundaries}
        score: UNKNOWN
      preliminary_leverage: UNKNOWN
      leverage_status: PROVISIONAL_FOR_PASS_04_AND_PASS_05
      confidence: HIGH
      missing_data_markers:
        - frequency, false-positive rate, implementation burden and maintenance burden are UNKNOWN
      qualification: This is a requirement gap, not evidence that a framework or graph is needed.
      neutral_capability_need_class: REUSABLE_SEMANTIC_WORKFLOW_CANDIDATE
      priority: P0_BEFORE_MATERIAL_GOV_7_WORK
      dependencies: [ER-002, ER-004, ER-005, ER-006, OWNER_SCOPE_DECISION]
      unresolved_questions:
        - What exact effect classes exist in the separately selected bounded transition?
      authority_boundary: No effect taxonomy, authorization model or implementation is selected or authorized by PASS-01.

