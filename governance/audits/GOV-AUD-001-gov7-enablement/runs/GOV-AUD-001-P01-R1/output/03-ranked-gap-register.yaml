gap_register:
  audit_id: GOV-AUD-001
  run_id: GOV-AUD-001-P01-R1
  pass_id: PASS-01
  status: EXECUTED_VALIDATED_PENDING_PROJECT_OWNER_DISPOSITION
  gap_entry_count: 14
  demonstrated_gap_count: 3
  ranking_method:
    evidence_priority_formula: frequency_x_current_burden_x_failure_risk
    factor_scale:
      frequency:
        1: one observed occurrence
        2: two observed occurrences
        3: three to four observed occurrences
        4: five to seven observed occurrences
        5: eight or more observed occurrences
      current_burden:
        1: negligible bounded correction
        2: local correction without workflow blocking
        3: one material rerun or correction cycle
        4: multi-artifact, package or review correction
        5: authority, durable-state or phase-publication blocking burden
      failure_risk:
        1: cosmetic only
        2: local nonmaterial defect
        3: work-unit or publication blockage
        4: custody, coverage or semantic near miss
        5: authority, durable-state, unsafe-effect or irreversible-effect risk
    unknown_rule: If frequency, burden or risk lacks evidence, the score is UNKNOWN and no substitute value is inferred.
    preliminary_leverage: Provisional expected reduction divided by estimated solution burden, using only LOW, MEDIUM, HIGH or UNKNOWN; reserved for PASS-04/PASS-05 reassessment.
  entries:
    - gap_id: GAP-001
      label: Reusable prospective execution and authorization lifecycle gate
      statement_label: VERIFIED_FACT
      classification: DEMONSTRATED_GAP
      problem: KGR-006 executed without contemporaneous repository authorization custody; KGR-006-R1 corrected the case with a specialized one-execution gate, but no generic pass/run lifecycle gate is demonstrated.
      evidence:
        - governance/learning/records/HP-FAIL-014.yaml
        - governance/runs/KGR-006-R1-enforcement-analysis-correction/run-manifest.yaml
        - governance/tools/prepare_enforcement_correction.py
      evidence_priority:
        frequency: {value: 1, basis: one preserved material custody failure}
        current_burden: {value: 5, basis: retrospective attestation, versioned correction preparation and new Owner authorization were required}
        failure_risk: {value: 5, basis: durable execution authority could not be established prospectively}
        score: 25
      preliminary_leverage: HIGH
      leverage_status: PROVISIONAL_FOR_PASS_04_AND_PASS_05
      confidence: HIGH
      missing_data_markers:
        - exact frequency of manually assembled prospective gates outside the preserved failure is UNKNOWN
        - exact Owner and operator time is UNKNOWN
      qualification: Existing prompt custody and KGR-006-R1 patterns solve the primitives; the demonstrated gap is reusable lifecycle coverage, not authorization judgment.
      neutral_capability_need_class: REUSABLE_SEMANTIC_WORKFLOW_CANDIDATE
      priority: P0_BEFORE_MATERIAL_GOV_7_WORK
      dependencies: [CAP-001, CAP-002, PROJECT_OWNER_AUTHORIZATION]
      unresolved_questions:
        - Which lifecycle facts vary by run and which are stable invariants?
      authority_boundary: No automation may create, infer, reuse or approve Project Owner authority.

    - gap_id: GAP-002
      label: Declared cross-surface lifecycle reconciliation
      statement_label: VERIFIED_FACT
      classification: DEMONSTRATED_GAP
      problem: Material completion and authorization consumption have repeatedly required manual comparison because the current state validator is specialized to one governance history.
      evidence:
        - governance/learning/records/HP-FAIL-017.yaml
        - governance/learning/records/HP-FAIL-019.yaml
        - governance/learning/records/HP-FAIL-020.yaml
        - governance/tools/validate_governance_state.py
      evidence_priority:
        frequency: {value: 3, basis: three direct recent lifecycle/state failures}
        current_burden: {value: 5, basis: failures blocked publication or left authority and phase surfaces divergent}
        failure_risk: {value: 5, basis: stale state could imply reusable execution authority or an incorrect phase}
        score: 75
      preliminary_leverage: HIGH
      leverage_status: PROVISIONAL_FOR_PASS_04_AND_PASS_05
      confidence: HIGH
      missing_data_markers:
        - exact manual comparison count is UNKNOWN
        - exact correction time is UNKNOWN
      qualification: The current validator is strong reusable evidence but does not demonstrate a general audit-pass or future GOV-7 lifecycle projection.
      neutral_capability_need_class: DETERMINISTIC_AUTOMATION_CANDIDATE
      priority: P0_BEFORE_MATERIAL_GOV_7_WORK
      dependencies: [CAP-005, DECLARED_STATUS_BEARING_SURFACES]
      unresolved_questions:
        - What is the minimum authoritative lifecycle source from which other status views can be checked or generated?
      authority_boundary: Reconciliation may compare declared facts but may not decide constitutional sufficiency or apply an unauthorized phase transition.

    - gap_id: GAP-003
      label: Canonical-source and meaning-bearing parity enforcement
      statement_label: VERIFIED_FACT
      classification: DEMONSTRATED_GAP
      problem: Deterministic counts and schema validity have passed while canonical routes, structured meaning or duplicated safety boundaries were wrong or brittle.
      evidence:
        - governance/learning/records/HP-FAIL-007.yaml
        - governance/learning/records/HP-FAIL-010.yaml
        - governance/learning/records/HP-FAIL-011.yaml
        - governance/learning/records/HP-FAIL-012.yaml
        - governance/learning/records/HP-FAIL-015.yaml
        - governance/learning/records/HP-FAIL-016.yaml
        - governance/learning/records/HP-FAIL-018.yaml
      evidence_priority:
        frequency: {value: 4, basis: seven direct recent validation, inventory or parity failures}
        current_burden: {value: 4, basis: corrections affected validators, schemas, packages or independent review}
        failure_risk: {value: 4, basis: canonical coverage or safe-boundary divergence can survive structural validation}
        score: 64
      preliminary_leverage: HIGH
      leverage_status: PROVISIONAL_FOR_PASS_04_AND_PASS_05
      confidence: HIGH
      missing_data_markers:
        - exact semantic-review effort is UNKNOWN
      qualification: Exact semantic fidelity still requires bounded human or independent review; deterministic single-source checks should cover machine-settleable facts.
      neutral_capability_need_class: DETERMINISTIC_AUTOMATION_CANDIDATE
      priority: P0_BEFORE_MATERIAL_GOV_7_WORK
      dependencies: [CAP-003, CAP-008, CANONICAL_STRUCTURED_SOURCE]
      unresolved_questions:
        - Which future duplicated fields are meaning-bearing and require exact equality rather than paraphrase review?
      authority_boundary: Parity checks validate declared consistency only and cannot accept the underlying meaning or risk.

    - gap_id: GAP-004
      label: General managed non-success, containment and recovery lifecycle
      statement_label: INFERENCE
      classification: PARTIAL_CAPABILITY
      problem: The bounded Controller demonstrates one closure loop, while ER-016 and ER-018 require owned non-success and containment behavior and ER-019 requires transition-specific recovery evidence.
      evidence:
        - governance/tools/apply_loop_transition.py
        - governance/learning/records/HP-FAIL-008.yaml
        - governance/learning/records/HP-FAIL-009.yaml
        - governance/learning/records/HP-FAIL-013.yaml
        - governance/runs/KGR-006-R1-enforcement-analysis-correction/outputs/01-clause-implication-matrix.yaml
      evidence_priority:
        frequency: {value: 3, basis: three direct Controller calculation, persistence or replay failures}
        current_burden: {value: 4, basis: authorized transition or bundle validation was blocked}
        failure_risk: {value: 5, basis: incorrect persistence or replay can corrupt durable lifecycle truth}
        score: 60
      preliminary_leverage: MEDIUM
      leverage_status: PROVISIONAL_FOR_PASS_04_AND_PASS_05
      confidence: MEDIUM
      missing_data_markers:
        - frequency and burden for a future GOV-7 transition are UNKNOWN
        - recovery effectiveness is untested
      qualification: Reuse the narrow Controller's invariants; do not infer that it should become a general workflow platform.
      neutral_capability_need_class: REUSABLE_SEMANTIC_WORKFLOW_CANDIDATE
      priority: P1_FIRST_APPROVED_IMPLEMENTATION_INCREMENT
      dependencies: [CAP-004, ER-016, ER-018, GAP-011]
      unresolved_questions:
        - Which non-success states and external residual effects apply to the later selected transition?
      authority_boundary: PASS-01 does not select, design or implement a state machine or recovery mechanism.

