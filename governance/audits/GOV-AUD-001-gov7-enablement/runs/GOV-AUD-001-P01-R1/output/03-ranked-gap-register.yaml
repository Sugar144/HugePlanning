      statement_label: VERIFIED_FACT
      classification: REQUIREMENT_WITHOUT_IMPLEMENTATION
      problem: ER-002, ER-004, ER-005 and ER-006 require architecture-effect classification, effect-scoped authorization, deviation lifecycle and cumulative related-work accounting; KGR-006-R1 found no complete capability evidence.
      evidence:
