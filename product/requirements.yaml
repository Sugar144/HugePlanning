# Methodology product requirements — in-flight stages only (S0b, S1).
# Contract: product/README.md · schema: schemas/product-requirements.schema.json
# Validated by tests/run-tests.sh (T14). Never renumber; supersede, don't rewrite.
schema_version: 1.0.0
requirements:
  - id: CON-001
    type: constraint
    statement: >-
      validate.sh remains the single progressive client-repository validator:
      S0b extends it in place (schema checks, profile matrix, ID checks) and
      no second validator script is ever created.
    status: approved
    stage: S0b
    acceptance_criteria: []
    source_refs: [decision:R2-26, "plan:02 §8"]

  - id: CON-002
    type: constraint
    statement: >-
      Every schema and structured artifact added at S0b/S1 reuses the S0a
      conventions-rule namespace (ID grammar, status enums, schema_version
      policy, versioned $id) — no parallel conventions are introduced.
    status: approved
    stage: S0b
    acceptance_criteria: []
    source_refs: [decision:R2-02, "plan:06 §4"]

  - id: NFR-001
    type: nonfunctional
    statement: >-
      The deterministic test suite stays fully offline and repeatable: no live
      CLI or network dependency, green in paths containing spaces, and it
      leaves the real methodology tree byte-for-byte unchanged.
    status: approved
    stage: S0b
    acceptance_criteria: []
    source_refs: ["plan:02 §10", "report:reports/experiments/s0a/EXPERIMENT_S0A_REPORT.md"]
