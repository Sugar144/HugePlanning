    title: Bounded fresh-context interview segments (context-amplification fix)
    implements: [FR-015]
    depends_on: [TASK-022]
    status: approved
    packet: product/tasks/TASK-023.md
    notes: >-
      Realization refinement of the FR-015 resume contract. Scenario 05 ran as
      one continuous subagent whose context grew monotonically to a ~112k-token
      final-turn footprint (the recorded 115,594 figure is that footprint, not
      output; measured output 58,295). Runs the interview as bounded fresh
      segments that re-hydrate from compact state + last transcript window +
      current-module evidence, yielding to the orchestrator at each module
      boundary instead of accumulating one context. Adds a deterministic seam
      checker (tests/lib/interview-segment-seam-check.py) + fixtures
      (tests/interview-segment/) run by tests/run-tests.sh T21. No schema change,
      no requirement change; Scenario 05 RESULT.md unchanged.
